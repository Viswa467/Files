<!DOCTYPE html>
<html>
<head>

<title>Viswa Drive Access</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:120px;
}

.login-box{
background:white;
width:300px;
margin:auto;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5fd0;
}

#error{
color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input id="user" placeholder="Username"><br>

<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

var username=document.getElementById("user").value;
var password=document.getElementById("pass").value;

if(username=="viswa467" && password=="viswa1234"){

window.location.href="https://drive.google.com/drive/folders/1txjnkdLUQVUztmvPcQlcSRWzoxpBGVC3";

}else{

document.getElementById("error").innerHTML="Wrong username or password";

}

}

</script>

</body>
</html>
